<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Application Details</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

.card{
    max-width: 720px;
    margin: auto;
    background: #111827;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2{
    margin-bottom: 10px;
}

.badge{
    display: inline-block;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    text-transform: uppercase;
}

/* STATUS COLORS */
.status-applied{ background:#2563eb; }
.status-approved{ background:#16a34a; }
.status-rejected{ background:#dc2626; }
.status-cancelled{ background:#6b7280; }

.info{
    margin: 8px 0;
    line-height: 1.6;
}

.section-title{
    margin-top: 20px;
    font-weight: bold;
    color: #93c5fd;
}

a{
    display: inline-block;
    margin-top: 20px;
    color: #38bdf8;
    text-decoration: none;
}

a:hover{
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="card">

    <h2>{{ app.name }}</h2>

    <!-- STATUS BADGE -->
    <span class="badge status-{{ app.status }}">
        {{ app.status }}
    </span>

    <div class="section-title">Contact Info</div>

    <p class="info">📞 {{ app.phone }}</p>
    <p class="info">📍 {{ app.address }}</p>

    <div class="section-title">Work Info</div>

    <p class="info">💰 Expected Salary: {{ app.expected_salary or 'Not Provided' }}</p>
    <p class="info">⭐ Experience: {{ app.experience_years or 0 }} years</p>

    <div class="section-title">Message</div>

    <p class="info">
        {{ app.message or 'No message provided' }}
    </p>

    <a href="/owner/applications">⬅ Back to Applications</a>

</div>

</body>
    </html>
