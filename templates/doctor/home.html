<style>

:root{
    --primary:#2563eb;
    --secondary:#4f46e5;
}

body{
    background:linear-gradient(
        135deg,
        #eef4ff,
        #f8faff
    );
}

/* =====================
   TOP BAR
===================== */

.sf-topbar{

    position:sticky;
    top:0;
    z-index:999;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #4f46e5,
        #7c3aed
    );

    padding:15px 20px;

    border-radius:0 0 25px 25px;

    box-shadow:
    0 15px 35px rgba(79,70,229,.25);
}

.sf-logo{

    width:55px;
    height:55px;

    border-radius:16px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    font-weight:800;

    color:#fff;

    background:
    rgba(255,255,255,.15);

    backdrop-filter:blur(20px);
}

.sf-brand{

    color:#fff;

    font-size:22px;

    font-weight:800;
}

.sf-sub{

    color:rgba(255,255,255,.85);

    font-size:13px;
}

/* =====================
   SEARCH BAR
===================== */

.search-glass{

    margin-top:-15px;

    background:
    rgba(255,255,255,.85);

    backdrop-filter:blur(25px);

    padding:15px;

    border-radius:20px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.08);

    border:
    1px solid rgba(255,255,255,.6);
}

.search-input{

    border:none;

    background:transparent;

    width:100%;

    padding:12px;
}

.search-input:focus{

    outline:none;
}

/* =====================
   DOCTOR CARD
===================== */

.doctor-card{

    background:
    rgba(255,255,255,.85);

    backdrop-filter:blur(25px);

    border-radius:25px;

    overflow:hidden;

    box-shadow:
    0 10px 30px rgba(0,0,0,.08);

    transition:.35s;

    height:100%;
}

.doctor-card:hover{

    transform:translateY(-8px);

    box-shadow:
    0 20px 45px rgba(37,99,235,.18);
}

.doctor-cover{

    height:140px;

    position:relative;
}

.doctor-cover img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.doctor-profile{

    text-align:center;

    padding:20px;

    position:relative;
}

.profile-img{

    width:95px;
    height:95px;

    border-radius:50%;

    overflow:hidden;

    border:5px solid #fff;

    margin:auto;

    margin-top:-70px;

    background:#fff;

    box-shadow:
    0 8px 20px rgba(0,0,0,.15);
}

.profile-img img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.doctor-name{

    font-size:20px;

    font-weight:800;

    color:#111827;

    margin-top:12px;
}

.verified{

    color:#2563eb;
}

.degree{

    color:#4f46e5;

    font-weight:600;
}

.specialist{

    color:#374151;

    margin-top:6px;
}

.hospital{

    color:#6b7280;

    margin-top:6px;

    font-size:14px;
}

.stats{

    display:flex;

    justify-content:space-between;

    margin-top:15px;

    background:#f8fafc;

    border-radius:14px;

    padding:12px;

    font-weight:600;
}

.view-btn{

    display:block;

    width:100%;

    margin-top:15px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #4f46e5
    );

    color:#fff;

    text-decoration:none;

    padding:12px;

    border-radius:14px;

    font-weight:700;
}

.view-btn:hover{

    color:#fff;
}

</style><!-- TOP BAR --><div class="sf-topbar"><div class="d-flex align-items-center gap-3">

    <div class="sf-logo">
        S.F
    </div>

    <div>

        <div class="sf-brand">
            S.F Doctors Chamber
        </div>

        <div class="sf-sub">
            Professional Healthcare Directory
        </div>

    </div>

</div>

</div><div class="container py-4"><!-- SEARCH -->

<div class="search-glass mb-4">

    <form action="/doctors/search">

        <div class="d-flex align-items-center">

            <span class="me-2">🔍</span>

            <input
                type="text"
                name="q"
                class="search-input"
                placeholder="Search doctor, specialization, hospital..."
            >

        </div>

    </form>

</div>

<!-- DOCTORS -->

<div class="row g-4">

    {% for doctor in doctors %}

    <div class="col-lg-4 col-md-6">

        <div class="doctor-card">

            <div class="doctor-cover">

                <img
                    src="{{ doctor.cover_photo or '/static/images/doctor-cover.jpg' }}"
                >

            </div>

            <div class="doctor-profile">

                <div class="profile-img">

                    <img
                        src="{{ doctor.profile_photo or '/static/images/default-doctor.png' }}"
                    >

                </div>

                <div class="doctor-name">

                    {{ doctor.name }}

                    {% if doctor.verified %}
                    <span class="verified">✔</span>
                    {% endif %}

                </div>

                <div class="degree">
                    {{ doctor.degree }}
                </div>

                <div class="specialist">
                    🩺 {{ doctor.specialization }}
                </div>

                <div class="hospital">
                    🏥 {{ doctor.hospital }}
                </div>

                <div class="stats">

                    <div>
                        ⭐ {{ doctor.ratings|length }}
                    </div>

                    <div>
                        👁 {{ doctor.views }}
                    </div>

                </div>

                <a
                    href="/doctors/profile/{{ doctor.id }}"
                    class="view-btn"
                >
                    View Profile
                </a>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

</div>
