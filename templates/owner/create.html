<!-- ===================================================== -->
<!-- LIVE TV UPLOAD PANEL -->
<!-- ===================================================== -->

<div class="container-fluid py-4">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <!-- CARD -->
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- HEADER -->
                <div class="bg-dark text-white p-4">

                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

                        <div>
                            <h2 class="fw-bold mb-1">
                                📺 Live TV Upload Center
                            </h2>

                            <small class="text-light opacity-75">
                                Upload video, banner, audio & popup media
                            </small>
                        </div>

                        <span class="badge bg-success fs-6 px-3 py-2 rounded-pill">
                            🟢 Production Live
                        </span>

                    </div>

                </div>

                <!-- BODY -->
                <div class="card-body p-4">

                    <form method="POST"
                          action="/owner/live-tv/upload"
                          enctype="multipart/form-data">

                        <div class="row g-4">

                            <!-- TITLE -->
                            <div class="col-md-6">

                                <label class="form-label fw-semibold">
                                    Media Title
                                </label>

                                <input type="text"
                                       class="form-control form-control-lg rounded-3"
                                       name="title"
                                       placeholder="Enter media title"
                                       required>

                            </div>

                            <!-- CATEGORY -->
                            <div class="col-md-6">

                                <label class="form-label fw-semibold">
                                    Category
                                </label>

                                <input type="text"
                                       class="form-control form-control-lg rounded-3"
                                       name="category"
                                       placeholder="News / Ads / Music / Live">

                            </div>

                            <!-- DESCRIPTION -->
                            <div class="col-12">

                                <label class="form-label fw-semibold">
                                    Description
                                </label>

                                <textarea class="form-control rounded-3"
                                          rows="4"
                                          name="description"
                                          placeholder="Write media details..."></textarea>

                            </div>

                            <!-- MEDIA TYPE -->
                            <div class="col-md-4">

                                <label class="form-label fw-semibold">
                                    Media Type
                                </label>

                                <select class="form-select form-select-lg rounded-3"
                                        name="media_type">

                                    <option value="video">
                                        🎬 Video
                                    </option>

                                    <option value="banner">
                                        🖼 Banner
                                    </option>

                                    <option value="audio">
                                        🎵 Audio
                                    </option>

                                    <option value="popup">
                                        📢 Popup
                                    </option>

                                    <option value="live_tv">
                                        📺 Live TV
                                    </option>

                                </select>

                            </div>

                            <!-- FILE -->
                            <div class="col-md-4">

                                <label class="form-label fw-semibold">
                                    Upload File
                                </label>

                                <input type="file"
                                       class="form-control form-control-lg rounded-3"
                                       name="file"
                                       required>

                            </div>

                            <!-- THUMBNAIL -->
                            <div class="col-md-4">

                                <label class="form-label fw-semibold">
                                    Thumbnail
                                </label>

                                <input type="file"
                                       class="form-control form-control-lg rounded-3"
                                       name="thumbnail">

                            </div>

                            <!-- STREAM URL -->
                            <div class="col-12">

                                <label class="form-label fw-semibold">
                                    Stream URL (Optional)
                                </label>

                                <input type="text"
                                       class="form-control rounded-3"
                                       name="stream_url"
                                       placeholder="https://youtube.com/live/...">

                            </div>

                        </div>

                        <!-- ================================================= -->
                        <!-- DISPLAY SETTINGS -->
                        <!-- ================================================= -->

                        <div class="mt-5">

                            <h5 class="fw-bold mb-4">
                                ⚙ Display Controls
                            </h5>

                            <div class="row g-3">

                                <div class="col-md-3">

                                    <div class="form-check form-switch">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="force_show">

                                        <label class="form-check-label">
                                            Force Show
                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-3">

                                    <div class="form-check form-switch">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="auto_play">

                                        <label class="form-check-label">
                                            Auto Play
                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-3">

                                    <div class="form-check form-switch">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="floating_mode"
                                               checked>

                                        <label class="form-check-label">
                                            Floating Mode
                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-3">

                                    <div class="form-check form-switch">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="show_popup">

                                        <label class="form-check-label">
                                            Popup Mode
                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-3">

                                    <div class="form-check form-switch">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="allow_fullscreen"
                                               checked>

                                        <label class="form-check-label">
                                            Fullscreen
                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-3">

                                    <div class="form-check form-switch">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="allow_resize"
                                               checked>

                                        <label class="form-check-label">
                                            Resize
                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-3">

                                    <div class="form-check form-switch">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="allow_drag"
                                               checked>

                                        <label class="form-check-label">
                                            Drag Move
                                        </label>

                                    </div>

                                </div>

                                <div class="col-md-3">

                                    <div class="form-check form-switch">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="allow_minimize"
                                               checked>

                                        <label class="form-check-label">
                                            Minimize
                                        </label>

                                    </div>

                                </div>

                            </div>

                        </div>

                        <!-- ================================================= -->
                        <!-- PLAYER SIZE -->
                        <!-- ================================================= -->

                        <div class="mt-5">

                            <h5 class="fw-bold mb-4">
                                📐 Player Size
                            </h5>

                            <div class="row g-3">

                                <div class="col-md-6">

                                    <label class="form-label">
                                        Width
                                    </label>

                                    <input type="number"
                                           class="form-control rounded-3"
                                           name="default_width"
                                           value="420">

                                </div>

                                <div class="col-md-6">

                                    <label class="form-label">
                                        Height
                                    </label>

                                    <input type="number"
                                           class="form-control rounded-3"
                                           name="default_height"
                                           value="240">

                                </div>

                            </div>

                        </div>

                        <!-- BUTTON -->
                        <div class="mt-5 d-flex gap-3 flex-wrap">

                            <button type="submit"
                                    class="btn btn-dark btn-lg px-5 rounded-3">

                                🚀 Upload Media

                            </button>

                            <a href="/owner/live-tv"
                               class="btn btn-outline-secondary btn-lg rounded-3">

                                Back

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

                              </div>
