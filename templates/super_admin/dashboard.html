<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F WORKS HUB • Super Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= GLOBAL ================= */
body{
    margin:0;
    font-family:Segoe UI;
    background: radial-gradient(circle at top,#0b1220,#020617);
    color:#fff;
}

/* ================= GLASS ================= */
.glass{
    background:rgba(255,255,255,0.06);
    backdrop-filter: blur(14px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
}

/* ================= SIDEBAR ================= */
.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100vh;
    padding:20px;
    transition:0.3s;
    background:rgba(2,6,23,0.9);
    backdrop-filter: blur(15px);
}

.sidebar.hide{
    left:-260px;
}

.logo{
    font-size:20px;
    font-weight:bold;
    margin-bottom:25px;
}

.menu a{
    display:flex;
    gap:12px;
    padding:12px;
    color:#cbd5e1;
    text-decoration:none;
    border-radius:12px;
    margin-bottom:8px;
}

.menu a:hover{
    background:rgba(255,255,255,0.08);
}

.menu a.active{
    background:#2563eb;
    color:#fff;
}

/* ================= MAIN ================= */
.main{
    margin-left:260px;
    padding:20px;
    transition:0.3s;
}

.main.full{
    margin-left:0;
}

/* ================= TOPBAR ================= */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
}

.search{
    position:relative;
}

.search input{
    width:320px;
    padding:10px 40px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.06);
    color:#fff;
}

.search i{
    position:absolute;
    left:12px;
    top:12px;
    color:#94a3b8;
}

/* ================= CARD ================= */
.cardx{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    padding:20px;
    border-radius:16px;
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
    .sidebar{left:-260px;}
    .main{margin-left:0;}
}

</style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar glass" id="sidebar">

    <div class="logo">
        🚀 S.F WORKS HUB
    </div>

    <div class="menu">

        <a href="#" onclick="loadDashboard()" class="active">
            <i class="fa fa-chart-line"></i> Dashboard
        </a>

        <a href="#" onclick="loadAdmins()">
            <i class="fa fa-user-shield"></i> Admins
        </a>

        <a href="#" onclick="loadUsers()">
            <i class="fa fa-users"></i> Users
        </a>

        <a href="#" onclick="loadLogs()">
            <i class="fa fa-clock"></i> Logs
        </a>

        <a href="/auth/logout">
            <i class="fa fa-right-from-bracket"></i> Logout
        </a>

    </div>

</div>

<!-- ================= MAIN ================= -->
<div class="main" id="main">

<!-- TOPBAR -->
<div class="topbar glass">

    <button class="btn btn-light btn-sm" onclick="toggleSidebar()">☰</button>

    <div class="search">
        <i class="fa fa-search"></i>
        <input id="searchInput" placeholder="Search users...">
    </div>

    <div>
        <b>SUPER ADMIN</b>
    </div>

</div>

<!-- CONTENT -->
<div id="content" class="mt-3"></div>

</div>

<script>

/* ================= SIDEBAR ================= */
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("hide");
    document.getElementById("main").classList.toggle("full");
}

/* ================= DASHBOARD ================= */
function loadDashboard(){

fetch('/super/analytics')
.then(r=>r.json())
.then(res=>{

let d = res.data;

document.getElementById("content").innerHTML = `
<div class="row g-3">

<div class="col-md-3"><div class="cardx">Admins<br><h3>${d.admins.total}</h3></div></div>
<div class="col-md-3"><div class="cardx">Users<br><h3>${d.users.total}</h3></div></div>
<div class="col-md-3"><div class="cardx">Active<br><h3>${d.users.active}</h3></div></div>
<div class="col-md-3"><div class="cardx">Apps<br><h3>${d.applications.total}</h3></div></div>

</div>

<div class="cardx mt-3">
<canvas id="chart"></canvas>
</div>
`;

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:d.growth.map(x=>x.date),
datasets:[{
data:d.growth.map(x=>x.count),
borderWidth:2
}]
}
});

});

}

/* ================= ADMINS ================= */
function loadAdmins(){

fetch('/super/admins')
.then(r=>r.json())
.then(res=>{

let html = `<div class="row g-3">`;

res.data.admins.forEach(a=>{

html += `
<div class="col-md-4">
<div class="cardx">

<b>${a.name}</b><br>
<small>${a.phone}</small><br>
Status: ${a.status}<br>

<a class="btn btn-primary btn-sm mt-2" href="#">
View
</a>

</div>
</div>`;
});

html += `</div>`;
document.getElementById("content").innerHTML = html;

});

}

/* ================= USERS ================= */
function loadUsers(){

fetch('/super/users')
.then(r=>r.text())
.then(html=>{
document.getElementById("content").innerHTML = html;
});

}

/* ================= LOGS ================= */
function loadLogs(){
window.location.href="/super/logs";
}

loadDashboard();

</script>

</body>
</html>
