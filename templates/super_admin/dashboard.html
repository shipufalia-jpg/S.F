<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F WORKS HUB • Super Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0b1220;
    color:#fff;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100vh;
    background:#0f172a;
    padding:20px;
    transition:0.3s;
    border-right:1px solid #1f2937;
}

.sidebar.hide{left:-260px;}

.sidebar h4{
    margin-bottom:20px;
}

/* MAIN */
.main{
    margin-left:260px;
    padding:20px;
    transition:0.3s;
}

.main.full{margin-left:0;}

/* CARDS */
.cardx{
    background:#111827;
    border:1px solid #1f2937;
    padding:15px;
    border-radius:12px;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* MENU */
.menu a{
    display:block;
    padding:10px;
    color:#cbd5e1;
    text-decoration:none;
    border-radius:10px;
    margin-bottom:5px;
}

.menu a:hover{
    background:#1e293b;
}

/* LOADING */
.loading{
    color:#94a3b8;
}
</style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar" id="sidebar">
    <h4>🚀 SUPER ADMIN</h4>

    <div class="menu">
        <a href="#" onclick="loadDashboard()"><i class="fa fa-chart-line"></i> Dashboard</a>
        <a href="#" onclick="loadAdmins()"><i class="fa fa-user-shield"></i> Admins</a>
        <a href="#" onclick="loadUsers()"><i class="fa fa-users"></i> Users</a>
        <a href="#" onclick="loadLogs()"><i class="fa fa-clock"></i> Logs</a>
        <a href="/auth/logout"><i class="fa fa-right-from-bracket"></i> Logout</a>
    </div>
</div>

<!-- ================= MAIN ================= -->
<div class="main" id="main">

<div class="topbar">
    <button class="btn btn-light btn-sm" onclick="toggleSidebar()">☰</button>
    <h5>CONTROL DASHBOARD</h5>
</div>

<div id="content" class="loading">Loading...</div>

</div>

<script>

let chartInstance = null;

/* ================= SIDEBAR ================= */
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("hide");
    document.getElementById("main").classList.toggle("full");
}

/* ================= DASHBOARD ================= */
async function loadDashboard(){

    try{
        document.getElementById("content").innerHTML = "Loading...";

        const res = await fetch('/super/analytics');
        const json = await res.json();

        const d = json.data;

        document.getElementById("content").innerHTML = `
        <div class="row g-3">

            <div class="col-md-3"><div class="cardx">Admins <h3>${d.admins.total}</h3></div></div>
            <div class="col-md-3"><div class="cardx">Users <h3>${d.users.total}</h3></div></div>
            <div class="col-md-3"><div class="cardx">Active <h3>${d.users.active}</h3></div></div>
            <div class="col-md-3"><div class="cardx">Blocked <h3>${d.users.blocked}</h3></div></div>

        </div>

        <div class="cardx mt-3">
            <canvas id="chart"></canvas>
        </div>
        `;

        const ctx = document.getElementById("chart");

        if(chartInstance){
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx,{
            type:'line',
            data:{
                labels: d.growth.map(x => x.date),
                datasets:[{
                    label: "User Growth",
                    data: d.growth.map(x => x.count),
                    borderWidth: 2,
                    tension: 0.4
                }]
            }
        });

    }catch(err){
        console.error(err);
        document.getElementById("content").innerHTML =
        `<div class="alert alert-danger">Dashboard failed to load</div>`;
    }
}

/* ================= ADMINS ================= */
async function loadAdmins(){

    try{
        document.getElementById("content").innerHTML = "Loading...";

        const res = await fetch('/super/admins');
        const json = await res.json();

        let html = `<div class="row g-3">`;

        json.data.admins.forEach(a=>{
            html += `
            <div class="col-md-4">
                <div class="cardx">
                    <b>${a.name}</b><br>
                    📞 ${a.phone}<br>
                    📧 ${a.email}<br>
                    Status: <b>${a.status}</b>
                </div>
            </div>`;
        });

        html += `</div>`;
        document.getElementById("content").innerHTML = html;

    }catch(err){
        document.getElementById("content").innerHTML =
        `<div class="alert alert-danger">Admins failed to load</div>`;
    }
}

/* ================= USERS ================= */
async function loadUsers(){

    try{
        document.getElementById("content").innerHTML = "Loading...";

        const res = await fetch('/super/users');
        const json = await res.json();

        let html = `<div class="row g-3">`;

        json.data.users.forEach(u=>{
            html += `
            <div class="col-md-4">
                <div class="cardx">
                    <b>${u.name}</b><br>
                    📞 ${u.phone}<br>
                    Role: ${u.role}<br>
                    Status: ${u.status}
                </div>
            </div>`;
        });

        html += `</div>`;
        document.getElementById("content").innerHTML = html;

    }catch(err){
        document.getElementById("content").innerHTML =
        `<div class="alert alert-danger">Users failed to load</div>`;
    }
}

/* ================= LOGS ================= */
function loadLogs(){
    window.location.href = "/super/logs";
}

/* ================= AUTO LOAD ================= */
loadDashboard();

</script>

</body>
</html>
