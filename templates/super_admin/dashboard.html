<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F WORK'S HUB • Super Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================================================
GLOBAL
========================================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1120;
    color:#e2e8f0;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

a{
    text-decoration:none;
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#334155;
    border-radius:20px;
}

/* =========================================================
SIDEBAR
========================================================= */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:270px;
    height:100vh;
    background:#020617;
    border-right:1px solid #1e293b;
    z-index:1000;
    overflow-y:auto;
}

.logo-box{
    padding:24px 20px;
    border-bottom:1px solid #1e293b;
}

.logo-title{
    font-size:24px;
    font-weight:bold;
    color:#fff;
}

.logo-sub{
    font-size:13px;
    color:#94a3b8;
    margin-top:5px;
}

.menu{
    padding:15px 10px;
}

.menu a{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 16px;
    margin-bottom:8px;
    color:#cbd5e1;
    border-radius:14px;
    transition:0.3s;
    font-size:15px;
}

.menu a:hover{
    background:#1e293b;
    color:#fff;
}

.menu a.active{
    background:#2563eb;
    color:#fff;
}

.menu i{
    width:22px;
    text-align:center;
}

/* =========================================================
MAIN
========================================================= */

.main{
    margin-left:270px;
    padding:24px;
}

/* =========================================================
TOPBAR
========================================================= */

.topbar{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:18px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:24px;
}

.topbar-left h3{
    margin:0;
    font-size:24px;
    font-weight:bold;
}

.topbar-left p{
    margin:0;
    color:#94a3b8;
    font-size:14px;
}

.topbar-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.search-box{
    position:relative;
}

.search-box i{
    position:absolute;
    top:12px;
    left:14px;
    color:#94a3b8;
}

.search-box input{
    width:300px;
    padding-left:40px;
    background:#0f172a;
    border:1px solid #334155;
    color:#fff;
    border-radius:12px;
}

.search-box input:focus{
    background:#0f172a;
    color:#fff;
    border-color:#2563eb;
    box-shadow:none;
}

.profile-box{
    display:flex;
    align-items:center;
    gap:10px;
    background:#0f172a;
    padding:8px 14px;
    border-radius:14px;
    border:1px solid #1e293b;
}

.profile-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

/* =========================================================
CARDS
========================================================= */

.dashboard-card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:20px;
    padding:22px;
    transition:0.3s;
    position:relative;
    overflow:hidden;
    height:100%;
}

.dashboard-card:hover{
    transform:translateY(-4px);
    border-color:#2563eb;
}

.dashboard-card .icon{
    width:55px;
    height:55px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#1d4ed8;
    font-size:22px;
    margin-bottom:18px;
}

.dashboard-card h6{
    color:#94a3b8;
    margin-bottom:8px;
}

.dashboard-card h2{
    font-weight:bold;
    margin-bottom:5px;
}

.dashboard-card p{
    margin:0;
    font-size:13px;
    color:#64748b;
}

/* =========================================================
PROFILE CARD
========================================================= */

.profile-card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:20px;
    padding:25px;
    margin-top:24px;
}

.profile-header{
    display:flex;
    align-items:center;
    gap:20px;
}

.profile-header img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #2563eb;
}

.profile-info h4{
    margin:0;
}

.profile-info p{
    margin-top:5px;
    color:#94a3b8;
}

.profile-stats{
    margin-top:25px;
}

.stat-box{
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:16px;
    padding:18px;
    text-align:center;
}

    /* =========================================================
PROFILE IMAGE
========================================================= */

.user-avatar{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #2563eb;
}

/* =========================================================
TABLE
========================================================= */

.table-box{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:20px;
    padding:20px;
    margin-top:24px;
}

.table{
    color:#fff;
}

.table thead{
    background:#1e293b;
}

.table td,
.table th{
    vertical-align:middle;
}

.table-hover tbody tr:hover{
    background:#1e293b;
}

/* =========================================================
BADGE
========================================================= */

.badge-active{
    background:#16a34a;
}

.badge-blocked{
    background:#dc2626;
}

.badge-pending{
    background:#ea580c;
}

/* =========================================================
BUTTON
========================================================= */

.btn-custom{
    border:none;
    border-radius:10px;
    padding:7px 14px;
    font-size:14px;
}

/* =========================================================
CHART
========================================================= */

.chart-box{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:20px;
    padding:24px;
    margin-top:24px;
}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:991px){

    .sidebar{
        width:85px;
    }

    .menu span,
    .logo-sub{
        display:none;
    }

    .logo-title{
        font-size:18px;
        text-align:center;
    }

    .main{
        margin-left:85px;
    }

    .search-box input{
        width:160px;
    }

    .topbar{
        flex-direction:column;
        align-items:flex-start;
    }

}

</style>

</head>

<body>

<!-- =====================================================
SIDEBAR
===================================================== -->

<div class="sidebar">

    <div class="logo-box">

        <div class="logo-title">
            🚀 S.F WORK'S HUB
        </div>

        <div class="logo-sub">
            Super Admin Control Panel
        </div>

    </div>

    <div class="menu">
        <a href="/notifications" class="position-relative me-3">

    <span style="font-size:24px;">
        🔔
    </span>

    <span id="notification-count"
          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
          style="
              font-size:11px;
              display:none;
              min-width:20px;
          ">

        0

    </span>

        </a>

        <a href="#" class="active" onclick="loadDashboard()">
            <i class="fa-solid fa-chart-line"></i>
            <span>Dashboard</span>
        </a>

        <a href="#" onclick="loadAdmins()">
            <i class="fa-solid fa-user-shield"></i>
            <span>Admins</span>
        </a>

        <a href="{{ url_for('super_admin.super_admin_users') }}">
            <i class="fa-solid fa-users"></i>
            <span>Users</span>
        </a>

        <a href="#" onclick="loadApplications()">
            <i class="fa-solid fa-file-lines"></i>
            <span>Applications</span>
        </a>

        <a href="#" onclick="loadLogs()">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Activity Logs</span>
        </a>

        <a href="#" onclick="loadProfile()">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>

        <a href="/auth/logout">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Logout</span>
        </a>

    </div>

</div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

    <!-- TOPBAR -->

    <div class="topbar">

        <div class="topbar-left">
            <h3 id="pageTitle">Dashboard</h3>
            <p>
                Welcome back to S.F WORK'S HUB
            </p>
        </div>

        <div class="topbar-right">

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    class="form-control"
                    id="searchInput"
                    placeholder="Search..."
                >

            </div>

            <div class="profile-box">

                <div class="profile-avatar">
                    S
                </div>

                <div>
                    <div style="font-size:14px;font-weight:bold;">
                        Super Admin
                    </div>

                    <div style="font-size:12px;color:#94a3b8;">
                        Full Access
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- CONTENT -->

    <div id="content"></div>

</div>

<script>

/* =========================================================
ACTIVE MENU
========================================================= */

function setActive(el){

    document.querySelectorAll(".menu a")
    .forEach(a => a.classList.remove("active"));

    el.classList.add("active");

}

/* =========================================================
DASHBOARD
========================================================= */

function loadDashboard(){

    document.getElementById("pageTitle").innerText = "Dashboard";

    fetch('/super/analytics')

    .then(res => res.json())

    .then(res => {

        let d = res.data;

        document.getElementById("content").innerHTML = `

        <div class="row g-4">

            <div class="col-lg-3 col-md-6">

                <div class="dashboard-card">

                    <div class="icon">
                        <i class="fa-solid fa-user-shield"></i>
                    </div>

                    <h6>Total Admins</h6>

                    <h2>${d.admins.total}</h2>

                    <p>Controlled Admin Accounts</p>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="dashboard-card">

                    <div class="icon">
                        <i class="fa-solid fa-users"></i>
                    </div>

                    <h6>Total Users</h6>

                    <h2>${d.users.total}</h2>

                    <p>All Controlled Users</p>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="dashboard-card">

                    <div class="icon">
                        <i class="fa-solid fa-user-check"></i>
                    </div>

                    <h6>Active Users</h6>

                    <h2>${d.users.active}</h2>

                    <p>Currently Active Accounts</p>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="dashboard-card">

                    <div class="icon">
                        <i class="fa-solid fa-file-circle-check"></i>
                    </div>

                    <h6>Applications</h6>

                    <h2>${d.applications.total}</h2>

                    <p>Total User Applications</p>

                </div>

            </div>

        </div>

        <div class="chart-box">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h5>
                    User Growth Analytics
                </h5>

                <span class="badge bg-primary">
                    Last 30 Days
                </span>

            </div>

            <canvas id="growthChart"></canvas>

        </div>
        `;

        const ctx = document.getElementById('growthChart');

        new Chart(ctx, {

            type: 'line',

            data: {

                labels: d.growth.map(g => g.date),

                datasets: [{

                    label: 'Users',

                    data: d.growth.map(g => g.count),

                    borderWidth:2,
                    tension:0.4

                }]

            }

        });

    });

}

/* =========================================================
ADMINS
========================================================= */

function loadAdmins(){

    document.getElementById("pageTitle").innerText = "Admins";

    fetch('/super/admins')

    .then(res => res.json())

    .then(res => {

        let html = `
        <div class="row g-4">
        `;

        res.data.admins.forEach(a => {

            html += `

            <div class="col-xl-4 col-lg-6">

                <div class="profile-card">

                    <div class="profile-header">

                        <img
                            src="${a.profile_image}"
                            alt="profile"
                            onerror="this.src='/static/images/default.png'"
                        >

                        <div class="profile-info">

                            <h4>${a.name}</h4>

                            <p>${a.phone}</p>

                            <span class="badge ${
                                a.status == 'active'
                                ? 'badge-active'
                                :
                                a.status == 'blocked'
                                ? 'badge-blocked'
                                : 'badge-pending'
                            }">

                                ${a.status}

                            </span>

                        </div>

                    </div>

                    <div class="profile-stats mt-4">

                        <div class="row g-3">

                            <div class="col-6">

                                <div class="stat-box">

                                    <h6>Email</h6>

                                    <p style="font-size:13px;">
                                        ${a.email || 'N/A'}
                                    </p>

                                </div>

                            </div>

                            <div class="col-6">

                                <div class="stat-box">

                                    <h6>Controller</h6>

                                    <p>
                                        ${a.controller_id}
                                    </p>

                                </div>

                            </div>

                            <div class="col-12">

                                <div class="stat-box">

                                    <h6>Address</h6>

                                    <p>
                                        ${a.address}
                                    </p>

                                </div>

                            </div>

                            <div class="col-12">

                                <div class="stat-box">

                                    <h6>Bio</h6>

                                    <p>
                                        ${a.bio}
                                    </p>

                                </div>

                            </div>

                            <div class="col-12">

                                <div class="stat-box">

                                    <h6>Joined</h6>

                                    <p>
                                        ${a.created_at}
                                    </p>

                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="d-flex gap-2 mt-4 flex-wrap">

                        <button
                            class="btn btn-success btn-sm"
                            onclick="updateAdmin(${a.id}, 'approve')"
                        >
                            Approve
                        </button>

                        <button
                            class="btn btn-warning btn-sm"
                            onclick="updateAdmin(${a.id}, 'reject')"
                        >
                            Reject
                        </button>

                        <button
                            class="btn btn-danger btn-sm"
                            onclick="updateAdmin(${a.id}, 'block')"
                        >
                            Block
                        </button>

                        <button
                            class="btn btn-primary btn-sm"
                            onclick="updateAdmin(${a.id}, 'unblock')"
                        >
                            Unblock
                        </button>

                    </div>

                </div>

            </div>

            `;
        });

        html += `
        </div>
        `;

        document.getElementById("content").innerHTML = html;

    });

                                       }
/* =========================================================
USERS
========================================================= */

function loadUsers() {

    document.getElementById("pageTitle").innerText = "Users";

    document.getElementById("content").innerHTML = `
        <div class="text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2">Loading users...</p>
        </div>
    `;

    fetch('/super_admin/users')
        .then(res => res.json())
        .then(res => {

            let users = res.users || res.data?.users || [];

            if (!users.length) {
                document.getElementById("content").innerHTML = `
                    <div class="text-center py-5 text-muted">
                        No users found
                    </div>
                `;
                return;
            }

            let html = `<div class="row g-4">`;

            users.forEach(u => {

                html += `
                <div class="col-xl-4 col-lg-6 col-md-6">

                    <div class="profile-card">

                        <div class="profile-header">

                            <img
                                src="${u.profile_image || '/static/default.png'}"
                                class="user-avatar"
                                alt="profile"
                                onerror="this.onerror=null;this.src='/static/default.png';"
                            />

                            <div class="profile-info">

                                <h4>${u.name || 'N/A'}</h4>

                                <p>${u.phone || 'N/A'}</p>

                                <span class="badge ${
                                    u.status === 'active'
                                    ? 'badge-active'
                                    : 'badge-blocked'
                                }">

                                    ${u.status || 'unknown'}

                                </span>

                            </div>

                        </div>

                        <div class="profile-stats mt-4">

                            <div class="row g-3">

                                <div class="col-6 stat-box">
                                    <h6>Email</h6>
                                    <p style="font-size:13px;">
                                        ${u.email || 'N/A'}
                                    </p>
                                </div>

                                <div class="col-6 stat-box">
                                    <h6>Controller</h6>
                                    <p>${u.controller_id || 'N/A'}</p>
                                </div>

                                <div class="col-12 stat-box">
                                    <h6>Address</h6>
                                    <p>${u.address || 'Not Added'}</p>
                                </div>

                                <div class="col-12 stat-box">
                                    <h6>Bio</h6>
                                    <p>${u.bio || 'No bio available'}</p>
                                </div>

                                <div class="col-12 stat-box">
                                    <h6>Joined</h6>
                                    <p>${u.created_at || 'N/A'}</p>
                                </div>

                                <div class="col-12 mt-2 d-flex gap-2">

                                    <a href="/super_admin/user/${u.id}"
                                       class="btn btn-dark btn-sm w-50">
                                        View
                                    </a>

                                    <a href="/chat/${u.id}"
                                       class="btn btn-primary btn-sm w-50">
                                        Chat
                                    </a>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>
                `;
            });

            html += `</div>`;

            document.getElementById("content").innerHTML = html;

        })
        .catch(err => {

            document.getElementById("content").innerHTML = `
                <div class="text-center text-danger py-5">
                    Failed to load users
                </div>
            `;

            console.error(err);
        });
        }
/* =========================================================
APPLICATIONS
========================================================= */

function loadApplications(){
    window.location.href = "/super/applications";
}

/* =========================================================
LOGS
========================================================= */

function loadLogs(){

    document.getElementById("pageTitle").innerText = "Activity Logs";

    fetch('/super/logs')

    .then(res => res.json())

    .then(res => {

        let html = `

        <div class="table-box">

            <h5 class="mb-4">
                Recent Activities
            </h5>

            <table class="table table-dark table-hover">

                <thead>

                    <tr>
                        <th>Actor</th>
                        <th>Target</th>
                        <th>Action</th>
                        <th>Role</th>
                        <th>Time</th>
                    </tr>

                </thead>

                <tbody>
        `;

        res.data.logs.forEach(l => {

            html += `

            <tr>

                <td>${l.actor}</td>

                <td>${l.target}</td>

                <td>${l.action}</td>

                <td>${l.role}</td>

                <td>${l.time}</td>

            </tr>
            `;
        });

        html += `
                </tbody>
            </table>
        </div>
        `;

        document.getElementById("content").innerHTML = html;

    });

}

/* =========================================================
PROFILE
========================================================= */

function loadProfile(){

    document.getElementById("pageTitle").innerText = "Profile";

    document.getElementById("content").innerHTML = `

    <div class="profile-card">

        <div class="profile-header">

            <img
                src="https://i.pravatar.cc/200"
            >

            <div class="profile-info">

                <h4>
                    Super Admin
                </h4>

                <p>
                    S.F WORK'S HUB Main Controller
                </p>

                <button class="btn btn-primary mt-2">
                    Edit Profile
                </button>

            </div>

        </div>

        <div class="profile-stats">

            <div class="row g-4">

                <div class="col-md-4">

                    <div class="stat-box">

                        <h4>
                            Full
                        </h4>

                        <p>
                            Access Level
                        </p>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="stat-box">

                        <h4>
                            Secure
                        </h4>

                        <p>
                            Account Status
                        </p>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="stat-box">

                        <h4>
                            Active
                        </h4>

                        <p>
                            Session Status
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>
    `;

}

/* =========================================================
UPDATE ADMIN
========================================================= */

function updateAdmin(id, action){

    fetch(`/super/admin/${id}/status`, {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            action:action
        })

    })

    .then(res => res.json())

    .then(() => {

        loadAdmins();

    });

}

/* =========================================================
SEARCH
========================================================= */

document
.getElementById("searchInput")
.addEventListener("keyup", function(){

    let value = this.value.toLowerCase();

    let rows = document.querySelectorAll("table tbody tr");

    rows.forEach(row => {

        row.style.display =
            row.innerText.toLowerCase().includes(value)
            ? ""
            : "none";

    });

});

/* =========================================================
INIT
========================================================= */

loadDashboard();

</script>

</body>
    </html>
