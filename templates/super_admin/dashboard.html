<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F Super Admin • Production Panel</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:Segoe UI;
    background:#0b1220;
    color:#fff;
}

/* ================= SIDEBAR ================= */
.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100vh;
    background:#0f172a;
    border-right:1px solid #1f2937;
    padding:20px;
    transition:0.3s ease;
    transform:translateX(0);
    overflow-y:auto;
    z-index:1000;
}

.sidebar.hide{
    transform:translateX(-100%);
}

/* ================= MAIN ================= */
.main{
    margin-left:260px;
    padding:20px;
    transition:0.3s ease;
}

.main.full{
    margin-left:0;
}

/* ================= LOGO ================= */
.logo{
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

/* ================= MENU ================= */
.menu a{
    display:block;
    padding:12px;
    color:#cbd5e1;
    text-decoration:none;
    border-radius:10px;
    margin-bottom:8px;
    transition:0.2s;
}

.menu a:hover{
    background:#1e293b;
    color:#fff;
}

/* ================= TOPBAR ================= */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111827;
    padding:12px 15px;
    border-radius:12px;
    margin-bottom:20px;
    border:1px solid #1f2937;
    gap:10px;
    flex-wrap:wrap;
}

/* ================= BUTTON ================= */
.btn-toggle{
    background:#2563eb;
    border:none;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
}

/* ================= SEARCH ================= */
.search-box{
    flex:1;
    min-width:200px;
}

.search-box input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#0f172a;
    color:white;
}

/* ================= GRID ================= */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.cardx{
    background:#111827;
    border:1px solid #1f2937;
    padding:15px;
    border-radius:12px;
}

/* ================= BADGE ================= */
.badge-live{
    background:#16a34a;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

/* ================= MOBILE ================= */
@media(max-width:900px){
    .main{
        margin-left:0;
    }
}
</style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar" id="sidebar">

    <div class="logo">🚀 SUPER ADMIN</div>

    <div class="menu">

        <a href="#" onclick="loadDashboard()"><i class="fa fa-chart-line"></i> Dashboard</a>
        <a href="#" onclick="loadAdmins()"><i class="fa fa-user-shield"></i> Admins</a>
        <a href="#" onclick="loadUsers()"><i class="fa fa-users"></i> Users</a>

        <!-- NEW ADD -->
        <a href="/booking/admin"><i class="fa fa-calendar"></i> Booking Control</a>
        <a href="/help-line"><i class="fa fa-phone"></i> Help Line</a>
        <a href="/admin/settings"><i class="fa fa-gear"></i> Settings</a>

        <a href="/super/applications"><i class="fa fa-file"></i> Applications</a>
        <a href="#" onclick="loadLogs()"><i class="fa fa-clock"></i> Logs</a>

        <a href="/auth/logout"><i class="fa fa-right-from-bracket"></i> Logout</a>

    </div>
</div>

<!-- ================= MAIN ================= -->
<div class="main" id="main">

    <div class="topbar">

        <button class="btn-toggle" onclick="toggleSidebar()">☰ Menu</button>

        <div class="search-box">
            <input type="text" placeholder="Search users, admins, logs...">
        </div>

        <span class="badge-live">🟢 LIVE SYSTEM</span>

    </div>

    <div id="content">Loading...</div>

</div>

<script>

let chartInstance = null;

/* ================= SIDEBAR TOGGLE FIX ================= */
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("hide");
    document.getElementById("main").classList.toggle("full");
}

/* ================= DASHBOARD ================= */
async function loadDashboard(){

    const res = await fetch("/super/analytics");
    const json = await res.json();
    const d = json.data;

    document.getElementById("content").innerHTML = `
    <div class="grid">

        <div class="cardx">Admins <h3>${d.admins.total}</h3></div>
        <div class="cardx">Users <h3>${d.users.total}</h3></div>
        <div class="cardx">Active <h3>${d.users.active}</h3></div>
        <div class="cardx">Blocked <h3>${d.users.blocked}</h3></div>
        <div class="cardx">Applications <h3>${d.applications.total}</h3></div>

    </div>
    `;
}

/* ================= ADMINS ================= */
async function loadAdmins(){

    const res = await fetch("/super/admins");
    const json = await res.json();

    let html = `<div class="grid">`;

    json.data.admins.forEach(a=>{
        html += `
        <div class="cardx">
            <b>${a.name}</b><br>
            ${a.phone}<br>
            Status: ${a.status}
        </div>`;
    });

    html += `</div>`;
    document.getElementById("content").innerHTML = html;
}

/* ================= USERS ================= */
async function loadUsers(){

    const res = await fetch("/super/users");
    const json = await res.json();

    let html = `<div class="grid">`;

    json.data.users.forEach(u=>{
        html += `
        <div class="cardx">
            <b>${u.name}</b><br>
            ${u.phone}<br>
            ${u.role} | ${u.status}
        </div>`;
    });

    html += `</div>`;
    document.getElementById("content").innerHTML = html;
}

/* ================= LOGS ================= */
async function loadLogs(){

    const res = await fetch("/super/logs");
    const json = await res.json();

    let html = "";

    json.data.logs.forEach(l=>{
        html += `
        <div class="cardx" style="margin-bottom:10px;">
            <b>${l.action.toUpperCase()}</b><br>
            ${l.time}<br>
            Actor: ${l.actor} → Target: ${l.target}
        </div>`;
    });

    document.getElementById("content").innerHTML = html;
}

/* INIT */
loadDashboard();

</script>

</body>
</html>
