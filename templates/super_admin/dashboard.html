<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F WORKS HUB • Super Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0b1220, #020617);
    color:#fff;
}

/* ================= GLASS ================= */

.glass{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
}

/* ================= SIDEBAR ================= */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100vh;
    padding:20px;
    background: rgba(2,6,23,0.9);
    backdrop-filter: blur(18px);
    border-right:1px solid rgba(255,255,255,0.08);
    transition:0.3s;
    z-index:999;
}

.sidebar.hide{
    left:-260px;
}

.logo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:25px;
}

.menu a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:12px;
    color:#cbd5e1;
    margin-bottom:10px;
    text-decoration:none;
    transition:0.3s;
    cursor:pointer;
}

.menu a:hover,
.menu a.active{
    background:#2563eb;
    color:#fff;
}

/* ================= MAIN ================= */

.main{
    margin-left:260px;
    padding:20px;
    transition:0.3s;
}

.main.full{
    margin-left:0;
}

/* ================= TOPBAR ================= */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-radius:16px;
}

/* ================= SEARCH BAR ================= */

.search-bar{
    margin-top:15px;
    position:relative;
}

.search-bar input{
    width:100%;
    padding:12px 45px;
    border-radius:14px;
    border:none;
    background:rgba(255,255,255,0.06);
    color:#fff;
}

.search-bar i{
    position:absolute;
    left:15px;
    top:14px;
    color:#94a3b8;
}

/* ================= CONTENT ================= */

.cardx{
    padding:20px;
    border-radius:16px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
}

/* ================= RESPONSIVE ================= */

@media(max-width:900px){
    .sidebar{left:-260px;}
    .main{margin-left:0;}
}

</style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar glass" id="sidebar">

    <div class="logo">
        🚀 S.F WORKS HUB
    </div>

    <div class="menu">

        <a class="active" onclick="loadDashboard()">
            <i class="fa fa-chart-line"></i> Dashboard
        </a>

        <a onclick="loadUsers()">
            <i class="fa fa-users"></i> Users
        </a>

        <a onclick="loadAdmins()">
            <i class="fa fa-user-shield"></i> Admins
        </a>

        <a onclick="loadLogs()">
            <i class="fa fa-clock"></i> Logs
        </a>

        <a href="/auth/logout">
            <i class="fa fa-right-from-bracket"></i> Logout
        </a>

    </div>

</div>

<!-- ================= MAIN ================= -->

<div class="main" id="main">

    <!-- TOPBAR -->

    <div class="topbar glass">

        <button class="btn btn-light btn-sm" onclick="toggleSidebar()">
            ☰
        </button>

        <div>
            <b>Super Admin Control Panel</b>
        </div>

    </div>

    <!-- SEARCH BAR -->

    <div class="search-bar glass">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search users, admins...">
    </div>

    <!-- CONTENT -->

    <div id="content" class="mt-3"></div>

</div>

<script>

/* ================= SIDEBAR TOGGLE ================= */

function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("hide");
    document.getElementById("main").classList.toggle("full");
}

/* ================= DASHBOARD ================= */

function loadDashboard(){

    document.getElementById("content").innerHTML = `
        <div class="cardx">
            <h3>Welcome to S.F WORKS HUB</h3>
            <p>Super Admin Control Dashboard System</p>
        </div>
    `;

}

/* ================= USERS ================= */

function loadUsers(){

    fetch('/super/users')
    .then(r=>r.json())
    .then(res=>{

        let users = res.data.users;

        let html = `<div class="row g-3">`;

        users.forEach(u=>{

            html += `
            <div class="col-md-4">

                <div class="cardx">

                    <b>${u.name}</b><br>
                    <small>${u.phone || ''}</small><br>
                    ${u.email || ''}<br>

                    <span>Status: ${u.status}</span>

                </div>

            </div>`;
        });

        html += `</div>`;

        document.getElementById("content").innerHTML = html;

    });

}

/* ================= ADMINS ================= */

function loadAdmins(){

    fetch('/super/admins')
    .then(r=>r.json())
    .then(res=>{
        document.getElementById("content").innerHTML =
        `<pre>${JSON.stringify(res.data, null, 2)}</pre>`;
    });

}

/* ================= LOGS ================= */

function loadLogs(){

    fetch('/super/logs')
    .then(r=>r.json())
    .then(res=>{
        document.getElementById("content").innerHTML =
        `<pre>${JSON.stringify(res.data, null, 2)}</pre>`;
    });

}

/* ================= SEARCH ================= */

document.getElementById("searchInput").addEventListener("keyup", function(){
    let value = this.value.toLowerCase();
    document.querySelectorAll(".cardx").forEach(card=>{
        card.style.display = card.innerText.toLowerCase().includes(value) ? "" : "none";
    });
});

/* ================= INIT ================= */

loadDashboard();

</script>

</body>
</html>
