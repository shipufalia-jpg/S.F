<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F WORK'S HUB • Super Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= GLOBAL ================= */

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0b1220, #020617);
    color:#fff;
}

/* ================= GLASS ================= */

.glass{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
}

/* ================= SIDEBAR ================= */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100vh;
    padding:20px;
    transition:0.3s;
    background: rgba(2,6,23,0.9);
    backdrop-filter: blur(18px);
    border-right:1px solid rgba(255,255,255,0.08);
}

.sidebar.hide{
    left:-260px;
}

.logo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:25px;
}

.menu a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:12px;
    color:#cbd5e1;
    margin-bottom:10px;
    text-decoration:none;
    transition:0.3s;
    cursor:pointer;
}

.menu a:hover,
.menu a.active{
    background:#2563eb;
    color:#fff;
}

/* ================= MAIN ================= */

.main{
    margin-left:260px;
    padding:20px;
    transition:0.3s;
}

.main.full{
    margin-left:0;
}

/* ================= TOPBAR ================= */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-radius:16px;
}

/* ================= SEARCH ================= */

.search{
    position:relative;
}

.search input{
    width:300px;
    padding:10px 40px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.06);
    color:#fff;
}

.search i{
    position:absolute;
    left:12px;
    top:12px;
    color:#94a3b8;
}

/* ================= CARD ================= */

.cardx{
    padding:20px;
    border-radius:16px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
}

/* ================= USER ================= */

.user-card img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #2563eb;
}

</style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar glass" id="sidebar">

    <div class="logo">🚀 S.F HUB</div>

    <div class="menu">

        <a class="active" onclick="setActive(this);loadDashboard()">
            <i class="fa fa-chart-line"></i> Dashboard
        </a>

        <a onclick="setActive(this);loadAdmins()">
            <i class="fa fa-user-shield"></i> Admins
        </a>

        <a onclick="setActive(this);loadUsers()">
            <i class="fa fa-users"></i> Users
        </a>

        <a onclick="setActive(this);loadLogs()">
            <i class="fa fa-clock"></i> Logs
        </a>

        <a href="/auth/logout">
            <i class="fa fa-right-from-bracket"></i> Logout
        </a>

    </div>

</div>

<!-- ================= MAIN ================= -->

<div class="main" id="main">

    <!-- TOPBAR -->

    <div class="topbar glass">

        <button class="btn btn-light btn-sm" onclick="toggleSidebar()">☰</button>

        <div class="search">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search...">
        </div>

        <div><b>Super Admin</b></div>

    </div>

    <!-- CONTENT -->

    <div id="content" class="mt-3"></div>

</div>

<script>

/* ================= SIDEBAR ================= */

function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("hide");
    document.getElementById("main").classList.toggle("full");
}

function setActive(el){
    document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));
    el.classList.add("active");
}

/* ================= DASHBOARD ================= */

function loadDashboard(){

    fetch('/super/analytics')
    .then(r=>r.json())
    .then(res=>{

        let d = res.data;

        document.getElementById("content").innerHTML = `
        <div class="row g-3">

            <div class="col-md-3"><div class="cardx">Admins<br><h3>${d.admins.total}</h3></div></div>
            <div class="col-md-3"><div class="cardx">Users<br><h3>${d.users.total}</h3></div></div>
            <div class="col-md-3"><div class="cardx">Active<br><h3>${d.users.active}</h3></div></div>
            <div class="col-md-3"><div class="cardx">Apps<br><h3>${d.applications.total}</h3></div></div>

        </div>
        `;
    });

}

/* ================= USERS ================= */

function loadUsers(){

    fetch('/super/users')
    .then(r=>r.json())
    .then(res=>{

        let users = res.data.users;

        let html = `<div class="row g-3">`;

        users.forEach(u=>{

            html += `
            <div class="col-md-4">

                <div class="cardx user-card">

                    <div class="d-flex gap-3 align-items-center">

                        <img src="${u.profile_image || '/static/default.png'}">

                        <div>
                            <b>${u.name}</b><br>
                            <small>${u.phone || ''}</small>
                        </div>

                    </div>

                    <hr>

                    <div>${u.email || ''}</div>
                    <div>Status: ${u.status}</div>

                    <a href="/super/user/${u.id}" class="btn btn-primary btn-sm mt-2">
                        View
                    </a>

                </div>

            </div>`;
        });

        html += `</div>`;

        document.getElementById("content").innerHTML = html;

    });

}

/* ================= ADMINS ================= */

function loadAdmins(){
    fetch('/super/admins')
    .then(r=>r.json())
    .then(res=>{
        document.getElementById("content").innerHTML =
        `<pre>${JSON.stringify(res.data,null,2)}</pre>`;
    });
}

/* ================= LOGS ================= */

function loadLogs(){
    fetch('/super/logs')
    .then(r=>r.json())
    .then(res=>{
        document.getElementById("content").innerHTML =
        `<pre>${JSON.stringify(res.data,null,2)}</pre>`;
    });
}

/* ================= INIT ================= */

loadDashboard();

</script>

</body>
</html>
