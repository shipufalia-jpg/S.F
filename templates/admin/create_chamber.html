{% extends "base.html" %}

{% block title %}
Create Chamber
{% endblock %}

{% block content %}

<style>
.container-box{
    max-width:900px;
    margin:auto;
}

.form-card{
    background:#fff;
    border-radius:24px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.page-title{
    margin-bottom:25px;
}

.page-title h2{
    margin:0;
    color:#0f172a;
}

.page-title p{
    color:#64748b;
    margin-top:5px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:1/-1;
}

label{
    margin-bottom:8px;
    font-weight:600;
    color:#334155;
}

input,
textarea,
select{
    width:100%;
    padding:12px 14px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    outline:none;
}

textarea{
    min-height:120px;
    resize:vertical;
}

.btn-row{
    display:flex;
    gap:12px;
    margin-top:25px;
}

.btn-save{
    border:none;
    background:#2563eb;
    color:#fff;
    padding:12px 22px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.btn-back{
    text-decoration:none;
    padding:12px 22px;
    border-radius:12px;
    background:#e2e8f0;
    color:#0f172a;
    font-weight:600;
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }
}
</style><div class="container-box"><div class="form-card">

    <div class="page-title">
        <h2>Create New Chamber</h2>
        <p>Add a new chamber under admin management.</p>
    </div>

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Chamber Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="form-group full">
                <label>Address</label>
                <textarea name="address"></textarea>
            </div>

        </div>

        <div class="btn-row">
            <button type="submit" class="btn-save">
                Create Chamber
            </button>

            <a href="/admin/chambers" class="btn-back">
                Back
            </a>
        </div>

    </form>

</div>

</div>{% endblock %}
