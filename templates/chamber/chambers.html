<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Chambers - S.F Doctor Chamber</title>

<style>

/* BACKGROUND */
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

/* HERO SECTION */
.hero{
    padding:25px 15px;
    text-align:center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

.hero h1{
    margin:0;
    font-size:22px;
}

.hero p{
    font-size:13px;
    opacity:0.8;
}

/* SEARCH BAR */
.search-bar{
    margin-top:15px;
    display:flex;
    justify-content:center;
}

.search-bar input{
    width:80%;
    max-width:400px;
    padding:12px;
    border:none;
    border-radius:12px 0 0 12px;
    outline:none;
}

.search-bar button{
    padding:12px 15px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:0 12px 12px 0;
    cursor:pointer;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
    padding:20px;
}

/* GLASS CARD */
.card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    border-radius:20px;
    padding:15px;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* CHAMBER NAME */
.card h3{
    margin:0;
    font-size:18px;
}

/* AREA */
.area{
    font-size:13px;
    opacity:0.8;
    margin-top:5px;
}

/* DOCTORS */
.doctors{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid rgba(255,255,255,0.2);
}

.doctor{
    background: rgba(255,255,255,0.07);
    padding:8px;
    margin-top:5px;
    border-radius:10px;
    font-size:14px;
}

/* BUTTON */
.toggle-btn{
    margin-top:10px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

/* NO RESULT */
.empty{
    text-align:center;
    opacity:0.7;
    margin-top:20px;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

    <h1>🏥 S.F Doctor Chamber</h1>
    <p>Find all chambers & doctors in one place</p>

    <!-- SEARCH -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search chamber, area...">
        <button onclick="filterCards()">🔎</button>
    </div>

</div>

<!-- GRID -->
<div class="container" id="cardContainer">

    {% for chamber in chambers %}

    <div class="card">

        <h3>🏥 {{ chamber.chamber_name }}</h3>

        <div class="area">📍 {{ chamber.area }}</div>

        <!-- DOCTORS -->
        <div class="doctors" id="doc-{{ chamber.id }}" style="display:none;">

            {% for doc in chamber.doctors %}
                <div class="doctor">
                    👨‍⚕️ {{ doc.name }} - {{ doc.specialization }}
                </div>
            {% endfor %}

        </div>

        <button class="toggle-btn"
            onclick="toggleDoctors({{ chamber.id }})">
            View Doctors 👇
        </button>

    </div>

    {% endfor %}

</div>

<div class="empty" id="empty" style="display:none;">
    No chambers found 😔
</div>

<script>

/* TOGGLE DOCTORS */
function toggleDoctors(id){
    let box = document.getElementById("doc-" + id);

    if(box.style.display === "none"){
        box.style.display = "block";
    }else{
        box.style.display = "none";
    }
}

/* SEARCH FILTER */
function filterCards(){

    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.getElementsByClassName("card");
    let empty = document.getElementById("empty");

    let found = 0;

    for(let i=0; i<cards.length; i++){

        let text = cards[i].innerText.toLowerCase();

        if(text.includes(input)){
            cards[i].style.display = "block";
            found++;
        }else{
            cards[i].style.display = "none";
        }
    }

    if(found === 0){
        empty.style.display = "block";
    }else{
        empty.style.display = "none";
    }
}

</script>

</body>
</html>
