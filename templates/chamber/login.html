<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chamber Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at top,#2a5298,#1e3c72);
    padding:20px;
}

/* ================= LOGIN BOX ================= */

.login-box{
    width:100%;
    max-width:380px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:18px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,0.35);
    color:#fff;
    animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ================= TITLE ================= */

.title{
    text-align:center;
    margin-bottom:25px;
}

.title h2{
    font-size:22px;
    font-weight:600;
}

.title p{
    font-size:13px;
    opacity:0.7;
    margin-top:5px;
}

/* ================= INPUT ================= */

.input-box{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:13px;
    border-radius:12px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.15);
    color:#fff;
    font-size:14px;
    transition:0.3s;
}

input::placeholder{
    color:rgba(255,255,255,0.7);
}

input:focus{
    background:rgba(255,255,255,0.25);
}

/* ================= BUTTON ================= */

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:5px;
}

button:hover{
    background:#16a34a;
    transform:translateY(-2px);
}

/* ================= FOOTER ================= */

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    opacity:0.7;
}

/* ================= ICON ================= */

.icon{
    text-align:center;
    font-size:40px;
    margin-bottom:10px;
    color:#22c55e;
}

</style>

</head>

<body>

<div class="login-box">

    <!-- ICON -->
    <div class="icon">
        <i class="fa-solid fa-hospital"></i>
    </div>

    <!-- TITLE -->
    <div class="title">
        <h2>Chamber Login</h2>
        <p>Access your chamber dashboard</p>
    </div>

    <!-- FORM -->
    <form method="POST" action="/chamber/login">

        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        Secure Chamber Access System
    </div>

</div>

</body>

</html>
