{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="mb-4">
            📅 Book Appointment
        </h3>

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input
                    type="text"
                    name="name"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input
                    type="tel"
                    name="phone"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Date</label>
                <input
                    type="date"
                    name="appointment_date"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Time</label>
                <input
                    type="time"
                    name="appointment_time"
                    class="form-control"
                    required
                >
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100"
            >
                Confirm Appointment
            </button>

        </form>

    </div>

</div>

{% endblock %}
