{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="mb-4">
            📅 Book Appointment
        </h3>

        <form
    method="POST"
    action="{{ url_for('chamber_panel.save_appointment') }}"
    >

            <input
                type="hidden"
                name="chamber_id"
                value="{{ chamber_id }}"
            >

            <input
                type="hidden"
                name="doctor_id"
                value="{{ doctor_id }}"
            >

            <div class="mb-3">
                <label>Name</label>
                <input
                    type="text"
                    name="name"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input
                    type="tel"
                    name="phone"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
    <label>Preferred Appointment Date</label>
    <input
        type="date"
        name="appointment_date"
        class="form-control"
        required
    >
</div>

<div class="mb-3">
    <label>Preferred Appointment Time</label>
    <input
        type="time"
        name="appointment_time"
        class="form-control"
        required
    >
</div>

<div class="mb-3">
    <label>Reason / Notes</label>
    <textarea
        name="notes"
        class="form-control"
        rows="3"
        placeholder="ডাক্তারকে কি দেখাতে চান লিখুন..."
    ></textarea>
</div>

            <button
                type="submit"
                class="btn btn-primary w-100"
            >
                Confirm Appointment
            </button>

        </form>

    </div>

</div>

{% endblock %}
